  <text x="35" y="380" font-family="Arial, sans-serif" font-size="29" font-weight="700" fill="#fff">with 에스더버니</text>
  <text x="35" y="411" font-family="Arial, sans-serif" font-size="16" fill="#fff">지금 서울숲은 버니 천국</text>
