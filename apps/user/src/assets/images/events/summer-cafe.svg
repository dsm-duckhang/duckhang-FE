    <linearGradient id="shade" x1="0" y1="0" x2="0" y2="1"><stop offset=".58" stop-color="#000" stop-opacity="0"/><stop offset="1" stop-color="#101820" stop-opacity=".82"/></linearGradient>
  </defs>
  <rect width="360" height="450" rx="18" fill="url(#sky)"/>
  <path d="M42 423V213l92-66 12 276Z" fill="#6c3228"/><path d="M133 423V102l181 91v230Z" fill="#9e473b"/>
